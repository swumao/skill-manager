name: Publish to npm

on:
  push:
    branches: [main, master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm version
      - run: npm config list
      - run: echo "--- npmrc content ---"; cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null || echo "no temp npmrc"
      - run: echo "--- env ---"; env | grep -i npm 2>/dev/null || true; env | grep -i auth 2>/dev/null || true; env | grep -i token 2>/dev/null || true; env | grep -i oidc 2>/dev/null || true
      - run: npm publish --provenance --access public
